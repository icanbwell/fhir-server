query entities($representations: [_Any!]!) {
  _entities(representations: $representations) {
    ... on AllergyIntolerance {
      id
      type
      allergyCategory: category
      criticality
      code {
        text
      }
    }
    ... on CareTeam {
      id
      resourceType
      category {
        coding {
          system
          code
        }
      }
      subject {
        reference
        extension {
          id
          url
          valueString
        }
      }
      careTeamName: name
      status
    }
    ... on Patient {
      id
      __typename
      name {
        family
        given
      }
      birthDate
    }
  }
}
