query {
  conditions {
    entry {
      resource {
        id
        onsetDateTime
        code {
          text
        }
        contained {
          ... on Location {
            resourceType
            name
            address {
              city
              country
              state
              postalCode
              line
            }
            managingOrganization {
              reference
              extension {
                id
                url
                valueString
              }
            }
          }
          ... on Organization {
            resourceType
            name
            type {
              coding {
                system
                code
                display
              }
            }
            telecom {
              system
              value
            }
          }
        }
        subject {
        reference
          extension {
            id
            url
            valueString
          }
        }
      }
    }
  }
}
