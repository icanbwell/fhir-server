services:
  fhir:
    depends_on:
      - mongo
      - keycloak
      - redis
      - clickhouse
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    environment:
      ACCESS_LOGS_CLUSTER_MONGO_URL: mongodb://mongo:27017
      ACCESS_LOGS_MONGO_DB_NAME: access-logs
      SHUTDOWN_DELAY_MS: 1000
      SERVER_PORT: 3000
      MONGO_DB_NAME: fhir
      MONGO_URL: 'mongodb://mongo:27017?appName=fhir-server'
      AUDIT_EVENT_MONGO_DB_NAME: audit-events
      AUDIT_EVENT_MONGO_URL: mongodb://mongo:27017
      RESOURCE_SERVER: http://localhost:3000/
      AUTH_SERVER_URI: http://myauthzserver.com
      AUTH_CONFIGURATION_URI: http://keycloak:8080/realms/master/.well-known/openid-configuration
      AUTH_JWKS_URL: http://keycloak:8080/realms/master/protocol/openid-connect/certs
      AUTH_CODE_FLOW_URL: http://keycloak:8080/realms/master/protocol/openid-connect/auth
      ENVIRONMENT: local
      ENABLE_MONGO_PROJECTIONS_IN_GRAPHQL: 0
      ENABLE_MONGO_PROJECTIONS_IN_GRAPHQLV2: 0
      MONGO_TIMEOUT: 30000
      LOGLEVEL: 'INFO'
      ENABLE_GRAPHQL: 1
      NODE_ENV: 'development'
      EXTERNAL_AUTH_JWKS_URLS: ''
      EXTERNAL_AUTH_WELL_KNOWN_URLS: ''
      SET_INDEX_HINTS: 0
      CREATE_INDEX_ON_COLLECTION_CREATION: 1
      RESOURCE_HISTORY_MONGO_URL: mongodb://mongo:27017
      RESOURCE_HISTORY_MONGO_DB_NAME: resource-history
      RETURN_BUNDLE: '1'
      USE_TWO_STEP_SEARCH_OPTIMIZATION: '0'
      LOG_EXCLUDE_RESOURCES: 'Person,Patient'
      STREAM_RESPONSE: '1'
      LOG_STREAM_STEPS: '0'
      ENABLE_EVENTS_KAFKA: '1'
      ENABLE_BULK_EXPORT_KAFKA_EVENTS: '1'
      ENABLE_FHIR_OPERATION_USAGE_KAFKA_EVENTS: 1
      ENABLE_MERGE_FAST_SERIALIZER: '1'
      ENABLE_PERSON_PATIENT_MANUAL_LINKING_KAFKA_EVENTS: 1
      ENABLE_KAFKA_HEALTHCHECK: '1'
      ENABLE_PATIENT_DATA_CHANGE_EVENTS: '1'
      ENABLE_PERSON_DATA_CHANGE_EVENTS: '1'
      KAFKA_CLIENT_ID: 'fhir-server'
      KAFKA_URLS: 'kafka:9092'
      KAFKA_MAX_RETRY: 3
      AUTH_CUSTOM_USERNAME: "cognito:username,preferred_username"
      AUTH_CUSTOM_GROUP: "cognito:groups,groups"
      AUTH_CUSTOM_SCOPE: "custom:scope"
      AUTH_REMOVE_SCOPE_PREFIX: "fhir/dev/"
      VALIDATE_SCHEMA: "1"
      PERSON_MATCHING_SERVICE_URL: "${PERSON_MATCHING_SERVICE_URL:-}"
      PERSON_MATCHING_SERVICE_CLIENT_ID: "${PERSON_MATCHING_SERVICE_CLIENT_ID:-}"
      PERSON_MATCHING_SERVICE_CLIENT_SECRET: "${PERSON_MATCHING_SERVICE_CLIENT_SECRET:-}"
      PERSON_MATCHING_SERVICE_TOKEN_URL: "${PERSON_MATCHING_SERVICE_TOKEN_URL:-}"
      WHITELIST: "http://localhost:5051"
      GRIDFS_RESOURCES: "DocumentReference"
      ENABLE_GRAPHQL_PLAYGROUND: '1'
      ENABLE_GRAPHQLV2_PLAYGROUND: '1'
      ENABLE_GRAPHQLV2: '1'
      ENABLE_CONSENTED_PROA_DATA_ACCESS: '1'
      ENABLE_HIE_TREATMENT_RELATED_DATA_ACCESS: '1'
      EXTERNAL_SERVICES_WITH_REQ_LIMIT: 'external-service|http://external-service.com'
      # FHIR_VALIDATION_URL: 'http://hapi-fhir-server:8080/fhir'
      ENABLE_STATS_ENDPOINT: '1'
      FHIR_SERVER_UI_URL: 'http://localhost:5051'
      REDIRECT_TO_NEW_UI: '1'
      KAFKAJS_NO_PARTITIONER_WARNING: '1'
      ENABLE_BULK_EXPORT: '1'
      ENABLE_MEMORY_CHECK: '1'
      ENABLE_USER_TYPE_RESOLUTION_FROM_ORGANIZATION: '1'
      CONTAINER_MEM_REQUEST: 1000000000
      NO_OF_REQUESTS_PER_POD: 10
      ENABLE_VULCAN_IG_QUERY: 'true'
      REQUIRED_AUDIT_EVENT_FILTERS: 'date'
      CLIENTS_WITH_DATA_CONNECTION_VIEW_CONTROL: 'client'
      PRE_SAVE_CODING_ID_UPDATE_RESOURCES: 'Binary,Observation'
      ENABLE_SWAGGER_DOC: 1
      HOST_SERVER: "http://localhost:3000"
      # REDIS_USERNAME: 'default'
      # REDIS_PASSWORD: ''
      REDIS_HOST: 'redis'
      REDIS_PORT: '6379'
      REDIS_REJECT_UNAUTHORIZED_FLAG: 'false'
      REDIS_ENABLE_TLS: 'false'
      ENABLE_REDIS: 1
      REDIS_KEY_DEFAULT_TTL_SECONDS: 600
      ENABLE_REDIS_CACHE_WRITE_FOR_EVERYTHING_OPERATION: 1
      ENABLE_REDIS_CACHE_READ_FOR_EVERYTHING_OPERATION: 1
      EVERYTHING_CACHE_TTL_SECONDS: 300
      REDIS_STREAM_READ_COUNT: 100
      REDIS_INVALIDATE_CACHE_KEYS_BATCH_SIZE: 300
      ENABLE_REDIS_CACHE_WRITE_FOR_SUMMARY_OPERATION: 1
      ENABLE_REDIS_CACHE_READ_FOR_SUMMARY_OPERATION: 1
      SUMMARY_CACHE_TTL_SECONDS: 300
      ENABLE_DELEGATED_ACCESS_DETECTION: 'true'
      ENABLE_COMPOSITION_SENSITIVE_SECTION_FILTERING: 'true'
      UNCLASSIFIED_TAGGING_RESOURCES: 'AllergyIntolerance,Appointment,CarePlan,ChargeItem,Claim,ClaimResponse,ClinicalImpression,Condition,DeviceRequest,DiagnosticReport,DocumentReference,Encounter,ExplanationOfBenefit,FamilyMemberHistory,Goal,ImagingStudy,Immunization,Invoice,MeasureReport,MedicationAdministration,MedicationDispense,MedicationRequest,MedicationStatement,Observation,Procedure,QuestionnaireResponse,RiskAssessment,ServiceRequest,Specimen'
      # ClickHouse configuration
      ENABLE_CLICKHOUSE: '1'
      CLICKHOUSE_HOST: 'http://clickhouse'
      CLICKHOUSE_PORT: '8123'
      CLICKHOUSE_DATABASE: 'fhir'
      CLICKHOUSE_USERNAME: 'default'
      CLICKHOUSE_PASSWORD: ''
      MONGO_WITH_CLICKHOUSE_RESOURCES: 'Group'
      ENABLE_AUDIT_EVENT: '1'
      CLICKHOUSE_ONLY_RESOURCES: 'AuditEvent'
      ENABLE_ACCESS_LOGS_CLICKHOUSE: '1'
      ENABLE_ACCESS_LOGS_MONGODB: '0'
    ports:
      - '3000:3000'
    volumes:
      - ./src:/srv/src/src
      - ./package.json:/srv/src/package.json
      - ./yarn.lock:/srv/src/yarn.lock
    command: yarn run dev
    healthcheck:
      test: [ 'CMD-SHELL', 'wget --spider --quiet localhost:3000/health || exit 1' ]

  mongo:
    image: mongo:8.0.15
    ports:
      - '27017:27017'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongo:27017/test --quiet

  keycloak:
    # https://github.com/keycloak/keycloak/releases
    image: quay.io/keycloak/keycloak:26.5.4
    environment:
      # Enable HTTP for development
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: true
      KC_HTTPS_ENABLED: false
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_FEATURES: dynamic-scopes
      # Keycloak UI creds
      ADMIN_USERNAME: admin-user
      ADMIN_PASSWORD: password
      # This is the service account that will be created in the realm
      CLIENT_ID: bwell-client-id
      CLIENT_SECRET: bwell-secret
      SERVICE_ACCOUNT_NAME: service-account
      SERVICE_ACCOUNT_PASSWORD: password
      SERVICE_ACCOUNT_SCOPE: user/*.* access/*.*
      # This is the user and password that will be created in the realm for patient scope token
      MY_USER_NAME: patient
      MY_USER_PASSWORD: password
      MY_USER_SCOPE: user/*.* access/*.* patient/*.*
      MY_USER_TOKEN_USERNAME: patient
      MY_USER_CLIENT_PERSON_ID: 0b2ad38a-20bc-5cf5-9739-13f242b05892
      MY_USER_CLIENT_PATIENT_ID: 22aa18af-af51-5799-bc55-367c22c85407
      MY_USER_MASTER_PERSON_ID: 0eb80391-0f61-5ce6-b221-a5428f2f38a7
      MY_USER_MASTER_PATIENT_ID: 668d0748-1484-4bba-9cbe-0faf0de8965c
      MY_USER_MANAGING_ORGANIZATION: 8a7cbd9c-5b1e-5c3d-9c4f-0b2e5f1a7c6d
      # This is the user and password that will be created in the realm for CMS scope token
      CMS_USER_NAME: cmsUser
      CMS_USER_PASSWORD: password
      CMS_USER_SCOPE: cmsPartnerUser patient/*.read user/*.read access/*.read
      CMS_USER_TOKEN_USERNAME: cmsUser
      CMS_USER_CLIENT_PERSON_ID: 49a49d6c-4987-4177-b0ff-24aa2a16ed023
      CMS_USER_CLIENT_PATIENT_ID: 49a49d6c-4987-4177-b0ff-24aa2a16ed024
      CMS_USER_MASTER_PERSON_ID: 49a49d6c-4987-4177-b0ff-24aa2a16ed021
      CMS_USER_MASTER_PATIENT_ID: 49a49d6c-4987-4177-b0ff-24aa2a16ed022
      CMS_USER_MANAGING_ORGANIZATION: 49a49d6c-4987-4177-b0ff-24aa2a16ed025
      # Delegated access user (real user with act claim for actor)
      MY_DELEGATED_ACCESS_USER_NAME: delegated-patient
      MY_DELEGATED_ACCESS_USER_PASSWORD: password
      MY_DELEGATED_ACCESS_USER_SCOPE: patient/*.read user/*.read access/*.read
      MY_DELEGATED_ACCESS_USER_TOKEN_USERNAME: delegated-patient@example.com
      MY_DELEGATED_ACCESS_USER_CLIENT_PERSON_ID: 0b2ad38a-20bc-5cf5-9739-13f242b05892
      MY_DELEGATED_ACCESS_USER_CLIENT_PATIENT_ID: 22aa18af-af51-5799-bc55-367c22c85407
      MY_DELEGATED_ACCESS_USER_MASTER_PERSON_ID: 0eb80391-0f61-5ce6-b221-a5428f2f38a7
      MY_DELEGATED_ACCESS_USER_MASTER_PATIENT_ID: 668d0748-1484-4bba-9cbe-0faf0de8965c
      DELEGATED_ACT_REFERENCE: RelatedPerson/36265db4-0da2-4436-b4e8-85bf7e52a425
      DELEGATED_ACT_SUB: 46265db4-0da2-4436-b4e8-85bf7e52a426
      DELEGATED_MANAGING_ORGANIZATION: 8a7cbd9c-5b1e-5c3d-9c4f-0b2e5f1a7c6d
      # This is the user and password that will be created in the realm for admin scope token
      MY_ADMIN_USER_NAME: admin
      MY_ADMIN_USER_PASSWORD: password@#$%^&873
      MY_ADMIN_USER_SCOPE: user/*.* access/*.* admin/*.*
      MY_ADMIN_USER_TOKEN_USERNAME: admin
    ports:
      - "8080:8080"
    command: ["start-dev", "--import-realm", "--verbose"]
    volumes:
      - ./keycloak-config/realm-import.json:/opt/keycloak/data/import/realm-import.json

  kafka:
    image: apache/kafka:latest
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    
  redis:
    image: redis:latest
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:25.12.1
    container_name: fhir-clickhouse
    ports:
      - '8123:8123'   # HTTP interface
      - '9900:9000'   # Native TCP interface
    environment:
      CLICKHOUSE_DB: fhir
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8123/ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # kafkaUI:
  #   image: provectuslabs/kafka-ui
  #   ports:
  #     - '9000:8080'
  #   environment:
  #     - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
  #     - 'JVM_OPTS=-Xms32M -Xmx64M'
  #     - SERVER_SERVLET_CONTEXT_PATH=/

  # hapi-fhir-server:
  #   image: hapiproject/hapi:v6.10.1
  #   container_name: hapi-fhir-server
  #   environment:
  #     - hapi.fhir.enable_repository_validating_interceptor=true
  #     - hapi.fhir.ig_runtime_upload_enabled=true
  #     - hapi.fhir.local_base_urls=https://hapi.fhir.org/baseR4,https://fhir.simplifier.net/bwellFHIRProfiles
  #   ports:
  #     - "3001:8080"

volumes:
  mongo_data:
  clickhouse_data:
