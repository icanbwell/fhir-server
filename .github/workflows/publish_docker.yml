name: publish_docker

on:
  release:
    types: [created]

jobs:
  main:
    runs-on: ubuntu-latest
    # skip test tags from auto publish to docker
    if: ${{ !contains(github.event.release.tag_name, '_') && !contains(github.event.release.tag_name, '-') }}
    steps:
      - name: Checkout Master
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@04e8485ecb6487243907e330d522ff60f02283ce
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v3
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: imranq2/node-fhir-server-mongo:latest, imranq2/node-fhir-server-mongo:${{ steps.previoustag.outputs.tag }}
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
