# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint & graphql sdl check
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack
        run: corepack enable
      - run: | # retry since mongo memory server fails to download sometimes
          yarn install || yarn install
      - name: lint
        run: |
          yarn run lint
      - name: Check GraphQL SDL snapshots
        run: |
          node generatorScripts/generateGraphqlSdl.js --check
  build:
    runs-on: ubuntu-latest
    name: test (chunk ${{ matrix.chunk }})
    strategy:
      matrix:
        shard: [ 1, 2, 3, 4, 5, 6, 7, 8 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Enable Corepack
        run: corepack enable
      - run: | # retry since mongo memory server fails to download sometimes
          yarn install || yarn install
      - name: jest
        run: |
          ./node_modules/.bin/jest --no-watchman --runInBand --forceExit --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          NODE_OPTIONS: "--max-old-space-size=10240"
          DEBUG: "testcontainers*"
