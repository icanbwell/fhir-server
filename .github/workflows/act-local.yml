# Local workflow for testing with `act` - uses npm instead of yarn
# Run with: act push -W .github/workflows/act-local.yml -j build --matrix shard:1

name: Local CI

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
      - run: npm install
      - run: npm run build --if-present
      - name: lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    name: test (chunk ${{ matrix.chunk }})
    strategy:
      matrix:
        shard: [ 1 ]  # Single shard for local testing
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Start ClickHouse container
        run: |
          docker compose up -d clickhouse
          echo "Waiting for ClickHouse to be ready..."
          for i in {1..60}; do
            if curl -s "http://localhost:8123/?query=SELECT%201" 2>/dev/null | grep -q '1'; then
              echo "✓ ClickHouse is ready"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
      - run: npm install
      - run: npm run build --if-present
      - name: jest
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          node --max-old-space-size=8192 ./node_modules/.bin/jest --no-watchman --silent --logHeapUsage --runInBand --forceExit --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          NODE_OPTIONS: "--max-old-space-size=10240"
